{{ define "main" }}

<!-- 搜索结果容器 -->
<div id="search-results"></div>
<!-- AI回答容器 -->
<div id="ai-response-container" class="hidden">
  <div
    class="ai-header flex items-center gap-2 py-3 border-b border-gray-600/50"
  >
    <img
      src="/image/deepseek-logo.svg"
      alt="DeepSeek AI"
      class="w-6 h-6"
      id="ai-logo"
    />
    <span class="text-xl font-medium text-green-500" id="ai-provider"
      >Ask DeepSeek</span
    >
  </div>
  <div id="ai-response" class="prose prose-invert max-w-none py-4"></div>
</div>
<!-- 加载指示器 -->
<div class="search-loading hidden text-2xl text-green-500">
  {{ i18n "searching" }}
</div>
<!-- AI回答加载指示器 -->
<div class="ai-loading hidden">
  <div class="flex items-center gap-2 py-4">
    <div class="animate-pulse flex space-x-1">
      <div class="h-2 w-2 bg-green-500 rounded-full"></div>
      <div class="h-2 w-2 bg-green-500 rounded-full"></div>
      <div class="h-2 w-2 bg-green-500 rounded-full"></div>
    </div>
    <span class="text-green-500"
      >{{ i18n "thinking" | default "Thinking..." }}</span
    >
  </div>
</div>
<!-- 添加AI模式指示器 -->
<div
  class="ai-mode-indicator hidden fixed top-24 right-5 bg-green-500/20 text-green-400 px-3 py-1 rounded-full text-sm"
>
  AI Mode: <span id="ai-mode-text">DeepSeek</span>
</div>
<!-- 搜索结果模板 -->
<script id="search-result-template" type="text/x-js-template">
  <div id="summary-${key}" class="mx-auto grid max-w-2xl grid-cols-1 gap-x-8 gap-y-2 mt-3 sm:mt-6 lg:mx-0 lg:max-w-none lg:grid-cols-1 border-b border-b-gray-600/50 border-dashed pb-8">
    <h3 class="mt-5 mb-2 sm:mt-3 line-clamp-1 text-2xl font-medium leading-8 text-gray-400 hover:text-gray-100"><a href="${link}">${title}</a></h3>
    <div class="mt-1 pr-5 line-clamp-3 text-xl font-light leading-8 text-gray-500">${content}</div>
  </div>
</script>

<!-- 外部库 -->
<script
  src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/6.6.2/fuse.min.js"
  integrity="sha512-Nqw1tH3mpavka9cQCc5zWWEZNfIPdOYyQFjlV1NvflEtQ0/XI6ZQ+H/D3YgJdqSUJlMLAPRj/oXlaHCFbFCjoQ=="
  crossorigin="anonymous"
  referrerpolicy="no-referrer"
></script>
<script
  src="https://cdnjs.cloudflare.com/ajax/libs/mark.js/8.11.1/mark.min.js"
  integrity="sha512-5CYOlHXGh6QpOFA/TeTylKLWfB3ftPsde7AnmhuitiTX4K5SqCLBeKro6sPS8ilsz1Q4NRx3v8Ko2IBiszzdww=="
  crossorigin="anonymous"
  referrerpolicy="no-referrer"
></script>
<!-- 添加Markdown渲染库 -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<!-- DOMPurify用于安全渲染HTML -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

<script>
  var summaryInclude = 180;
  var fuseOptions = {
    shouldSort: true,
    includeMatches: true,
    includeScore: true,
    tokenize: true,
    location: 0,
    distance: 100,
    minMatchCharLength: 1,
    keys: [
      // 搜索权重
      { name: "title", weight: 0.45 },
      { name: "contents", weight: 0.4 },
      { name: "permalink", weight: 0.15 },
    ],
  };

  // AI模式相关配置
  var aiConfig = {
    deepseek: {
      prefix: "@deepseek ",
      logo: "/image/deepseek-logo.svg",
      name: "Ask DeepSeek",
      endpoint: "/api/ai/deepseek", // 后端代理接口
      apiVersion: "v1",
    },
    // 添加更多AI提供商
    gemini: {
      prefix: "@gemini ",
      logo: "/image/gemini-logo.svg",
      name: "Ask Gemini",
      endpoint: "/api/ai/gemini",
      apiVersion: "v1",
    },
    openai: {
      prefix: "@openai ",
      logo: "/image/openai-logo.svg",
      name: "Ask ChatGPT",
      endpoint: "/api/ai/openai",
      apiVersion: "v1",
    },
  };

  var isAiMode = false;
  var currentAiProvider = null;

  // =============================
  // Search
  // =============================

  var inputBox = document.getElementById("search-query");
  if (inputBox !== null) {
    var searchQuery = param("q");
    if (searchQuery) {
      inputBox.value = searchQuery || "";
      // 检查是否是AI模式
      checkAiMode(searchQuery);
      if (isAiMode) {
        executeAiSearch(searchQuery);
      } else {
        executeSearch(searchQuery, false);
      }
    } else {
      document.getElementById("search-results").innerHTML =
        '<p class="py-5 text-xl text-red-500">{{ i18n "keywordmissing" }}</p>';
    }

    // 添加输入监听，检测AI前缀
    inputBox.addEventListener("input", function () {
      var query = inputBox.value;
      // 保存之前的状态以检测变化
      var wasAiMode = isAiMode;
      var prevProvider = currentAiProvider;

      // 检查新状态
      checkAiMode(query);

      // 只有在状态变化时才更新UI
      if (wasAiMode !== isAiMode || prevProvider !== currentAiProvider) {
        updateSearchUI();
      }
    });
  }

  // 检查是否处于AI模式
  function checkAiMode(query) {
    isAiMode = false;
    currentAiProvider = null;

    // 检查是否有任何AI提供商的前缀
    for (const [provider, config] of Object.entries(aiConfig)) {
      if (
        query &&
        query.toLowerCase().startsWith(config.prefix.toLowerCase())
      ) {
        isAiMode = true;
        currentAiProvider = provider;
        break;
      }
    }

    return isAiMode;
  }

  // 更新搜索UI以反映当前模式
  function updateSearchUI() {
    const modeIndicator = document.querySelector(".ai-mode-indicator");

    if (isAiMode && currentAiProvider) {
      const config = aiConfig[currentAiProvider];
      document.getElementById("ai-logo").src = config.logo;
      document.getElementById("ai-provider").textContent = config.name;
      document.getElementById("ai-mode-text").textContent = config.name.replace(
        "Ask ",
        ""
      );

      // 显示AI模式指示器
      modeIndicator.classList.remove("hidden");

      // 添加AI模式的视觉提示到输入框
      inputBox.classList.add("ai-input");
      inputBox.style.borderColor = "#10B981";
      inputBox.style.borderWidth = "2px";
    } else {
      // 隐藏AI模式指示器
      modeIndicator.classList.add("hidden");

      // 移除AI模式的视觉提示
      inputBox.classList.remove("ai-input");
      inputBox.style.borderColor = "";
      inputBox.style.borderWidth = "";
    }

    console.log(
      "AI Mode:",
      isAiMode ? "ON (" + currentAiProvider + ")" : "OFF"
    );
  }

  // 执行AI搜索
  function executeAiSearch(query) {
    if (!currentAiProvider) return;

    const config = aiConfig[currentAiProvider];
    // 移除AI前缀
    const userQuestion = query.substring(config.prefix.length);

    if (!userQuestion.trim()) return;

    // 隐藏搜索结果，显示AI容器
    document.getElementById("search-results").innerHTML = "";
    document.getElementById("search-results").classList.add("hidden");
    document.getElementById("ai-response-container").classList.remove("hidden");
    show(document.querySelector(".ai-loading"));

    // GitHub Pages环境下，使用本地模拟API或重定向到外部API服务
    if (
      window.location.hostname === "localhost" ||
      window.location.hostname === "127.0.0.1"
    ) {
      // 本地开发环境 - 使用模拟数据
      simulateAiResponse(currentAiProvider, userQuestion)
        .then(handleAiResponse)
        .catch(handleAiError);
    } else {
      // 生产环境 - 使用实际API
      callAiApi(currentAiProvider, userQuestion)
        .then(handleAiResponse)
        .catch(handleAiError);
    }
  }

  // 处理AI响应
  function handleAiResponse(response) {
    hide(document.querySelector(".ai-loading"));

    // 使用DOMPurify清理并渲染markdown回答
    const aiResponseElement = document.getElementById("ai-response");
    const markedContent = marked.parse(response);
    aiResponseElement.innerHTML = DOMPurify.sanitize(markedContent);

    // 语法高亮等其他处理
    if (window.Prism) {
      Prism.highlightAllUnder(aiResponseElement);
    }
  }

  // 处理AI错误
  function handleAiError(error) {
    hide(document.querySelector(".ai-loading"));
    document.getElementById(
      "ai-response"
    ).innerHTML = `<p class="text-red-500">Error: ${
      error.message || "无法获取AI回答"
    }</p>`;
    console.error("AI API Error:", error);
  }

  // 本地开发环境的模拟AI响应
  function simulateAiResponse(provider, question) {
    return new Promise((resolve) => {
      // 模拟网络延迟
      setTimeout(() => {
        const responses = {
          deepseek: `## DeepSeek AI回答
          
您的问题是: "${question}"

这是一个模拟的DeepSeek AI回答，因为您正在本地开发环境中运行。
在本地环境中，API调用会被模拟以便于开发和测试。

### 在GitHub Pages部署说明

要在GitHub Pages上实现AI功能，您需要使用:

1. 外部API代理服务，如Cloudflare Workers
2. 无服务器函数提供商，如Netlify Functions或Vercel Edge Functions

\`\`\`javascript
// 示例代码
async function callAI(question) {
  const response = await fetch('https://your-api-proxy.com');
  return response.json();
}
\`\`\``,

          gemini: `## Gemini AI回答
          
这是对问题"${question}"的模拟Gemini响应。

本地开发环境中无法访问实际的Gemini API。`,

          openai: `## ChatGPT回答
          
我是模拟的ChatGPT回答。您询问的是: "${question}"

*这只是本地开发环境中的一个模拟响应。*`,
        };

        resolve(responses[provider] || "无法识别的AI提供商");
      }, 1500);
    });
  }

  // 调用AI API的函数
  async function callAiApi(provider, question) {
    const config = aiConfig[provider];

    // GitHub Pages环境下，重定向到外部服务
    let apiEndpoint = config.endpoint;

    // 如果是GitHub Pages环境，使用外部服务
    if (window.location.hostname.includes("github.io")) {
      // 可以替换为您设置的实际外部API服务
      apiEndpoint = `https://your-api-proxy.example.com/api/${provider}`;
    }

    try {
      const response = await fetch(apiEndpoint, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          question: question,
          provider: provider,
        }),
      });

      if (!response.ok) {
        throw new Error(`API responded with status: ${response.status}`);
      }

      const data = await response.json();
      return data.answer || "没有返回回答";
    } catch (error) {
      console.error("Error calling AI API:", error);
      throw error;
    }
  }

  // 执行搜索操作，获取索引数据并使用 Fuse.js 进行搜索
  function executeSearch(searchQuery) {
    // 检查是否是AI模式
    if (checkAiMode(searchQuery)) {
      executeAiSearch(searchQuery);
      return;
    }

    show(document.querySelector(".search-loading"));
    // 隐藏AI容器，显示搜索结果
    document.getElementById("ai-response-container").classList.add("hidden");
    document.getElementById("search-results").classList.remove("hidden");

    // 通过 fetch API 获取 /{{ .Lang }}/index.json 数据文件
    fetch("/{{ .Lang }}/index.json").then(function (response) {
      if (response.status !== 200) {
        console.log(
          "Looks like there was a problem. Status Code: " + response.status
        );
        return;
      }
      // Examine the text in the response
      response
        .json()
        .then(function (pages) {
          var fuse = new Fuse(pages, fuseOptions);
          var result = fuse.search(searchQuery);
          if (result.length > 0) {
            populateResults(result);
          } else {
            document.getElementById("search-results").innerHTML =
              '<p class="py-5 text-xl text-red-500">{{ i18n "nomatch" }}</p>';
          }
          hide(document.querySelector(".search-loading"));
        })
        .catch(function (err) {
          console.log("Fetch Error :-S", err);
        });
    });
  }

  // 处理搜索结果并渲染到页面
  function populateResults(results) {
    var searchQuery = document.getElementById("search-query").value;
    var searchResults = document.getElementById("search-results");

    // pull template from hugo template definition
    var templateDefinition = document.getElementById(
      "search-result-template"
    ).innerHTML;

    results.forEach(function (value, key) {
      var contents = value.item.contents;
      var snippet = "";
      var snippetHighlights = [];

      snippetHighlights.push(searchQuery);
      snippet = contents.substring(0, summaryInclude * 2) + "&hellip;";

      //replace values
      var tags = "";
      if (value.item.tags) {
        value.item.tags.forEach(function (element) {
          tags =
            tags + "<a href='/tags/" + element + "'>" + "#" + element + "</a> ";
        });
      }

      var output = render(templateDefinition, {
        key: key,
        title: value.item.title,
        content: value.item.contents,
        link: value.item.permalink,
      });
      searchResults.innerHTML += output;

      snippetHighlights.forEach(function (snipvalue, snipkey) {
        var instance = new Mark(document.getElementById("summary-" + key));
        instance.mark(snipvalue);
      });
    });
  }

  // 模板渲染函数，支持条件渲染和变量替换
  function render(templateString, data) {
    var conditionalMatches, conditionalPattern, copy;
    conditionalPattern = /\$\{\s*isset ([a-zA-Z]*) \s*\}(.*)\$\{\s*end\s*}/g; // matches ${isset variable}content${end}
    //since loop below depends on re.lastInxdex, we use a copy to capture any manipulations whilst inside the loop
    copy = templateString;
    while (
      (conditionalMatches = conditionalPattern.exec(templateString)) !== null
    ) {
      if (data[conditionalMatches[1]]) {
        //valid key, remove conditionals, leave contents.
        copy = copy.replace(conditionalMatches[0], conditionalMatches[2]);
      } else {
        //not valid, remove entire section
        copy = copy.replace(conditionalMatches[0], "");
      }
    }
    templateString = copy;
    //now any conditionals removed we can do simple substitution
    var key, find, re;
    for (key in data) {
      find = "\\$\\{\\s*" + key + "\\s*\\}";
      re = new RegExp(find, "g");
      templateString = templateString.replace(re, data[key]);
    }
    return templateString;
  }

  // Helper Functions
  function show(elem) {
    if (elem) elem.style.display = "block";
  }

  function hide(elem) {
    if (elem) elem.style.display = "none";
  }

  function param(name) {
    return decodeURIComponent(
      (location.search.split(name + "=")[1] || "").split("&")[0]
    ).replace(/\+/g, " ");
  }
</script>

<style>
  /* AI回答容器样式 */
  .prose {
    color: #e2e8f0;
    line-height: 1.75;
  }
  .prose h1,
  .prose h2,
  .prose h3,
  .prose h4 {
    color: #f8fafc;
    margin-top: 1.5em;
    margin-bottom: 0.75em;
  }
  .prose p {
    margin-top: 1.25em;
    margin-bottom: 1.25em;
  }
  .prose a {
    color: #38b2ac;
    text-decoration: underline;
  }
  .prose code {
    background: #1a202c;
    color: #e2e8f0;
    padding: 0.2em 0.4em;
    border-radius: 0.25em;
  }
  .prose pre {
    background: #1a202c;
    overflow-x: auto;
    padding: 1em;
    border-radius: 0.375em;
  }
  .prose blockquote {
    border-left: 4px solid #4a5568;
    padding-left: 1em;
    color: #a0aec0;
    font-style: italic;
  }

  /* AI加载动画 */
  .ai-loading .animate-pulse div {
    animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
  }
  .ai-loading .animate-pulse div:nth-child(2) {
    animation-delay: 0.3s;
  }
  .ai-loading .animate-pulse div:nth-child(3) {
    animation-delay: 0.6s;
  }
  @keyframes pulse {
    0%,
    100% {
      opacity: 1;
    }
    50% {
      opacity: 0.3;
    }
  }

  /* AI输入框高亮样式 */
  input.ai-input {
    box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
    transition: all 0.2s ease-in-out;
  }

  /* AI模式指示器动画 */
  .ai-mode-indicator {
    animation: fadeIn 0.3s ease-in-out;
    box-shadow: 0 2px 10px rgba(16, 185, 129, 0.3);
    z-index: 100;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(-10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
</style>

{{ end }}
